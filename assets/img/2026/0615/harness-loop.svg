<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L8,5 L0,9 Z" fill="#cc8800"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L8,5 L0,9 Z" fill="#2a8a8a"/>
    </marker>
  </defs>

  <rect width="720" height="480" fill="#ffffff"/>

  <!-- title -->
  <text x="360" y="46" fill="#333" font-size="17" font-weight="700" text-anchor="middle">하네스 업데이트 사이클</text>

  <!-- arrows (clockwise) -->
  <line x1="290" y1="120" x2="424" y2="120" stroke="#cc8800" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <line x1="520" y1="150" x2="520" y2="324" stroke="#cc8800" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <line x1="430" y1="360" x2="296" y2="360" stroke="#cc8800" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <line x1="200" y1="330" x2="200" y2="156" stroke="#2a8a8a" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- center label -->
  <ellipse cx="360" cy="240" rx="72" ry="36" fill="none" stroke="#cc8800" stroke-width="1.5"/>
  <text x="360" y="246" fill="#a07000" font-size="15" font-weight="700" text-anchor="middle">반복 구현</text>

  <!-- top-left: 코드 생성 -->
  <rect x="110" y="90" width="180" height="60" rx="9" fill="#d6ecf5" stroke="#2a8a8a" stroke-width="1.8"/>
  <text x="200" y="126" fill="#1d5e5e" font-size="16" font-weight="700" text-anchor="middle">코드 생성</text>

  <!-- top-right: 디버깅 -->
  <rect x="430" y="90" width="180" height="60" rx="9" fill="#fff3d6" stroke="#cc8800" stroke-width="1.8"/>
  <text x="520" y="126" fill="#8a5a00" font-size="16" font-weight="700" text-anchor="middle">디버깅</text>

  <!-- bottom-right: 리팩터링 -->
  <rect x="430" y="330" width="180" height="60" rx="9" fill="#fff3d6" stroke="#cc8800" stroke-width="1.8"/>
  <text x="520" y="366" fill="#8a5a00" font-size="16" font-weight="700" text-anchor="middle">리팩터링</text>

  <!-- bottom-left: 하네스 업데이트 -->
  <rect x="110" y="330" width="180" height="60" rx="9" fill="#fff3d6" stroke="#cc8800" stroke-width="1.8"/>
  <text x="200" y="366" fill="#8a5a00" font-size="16" font-weight="700" text-anchor="middle">하네스 업데이트</text>
</svg>
